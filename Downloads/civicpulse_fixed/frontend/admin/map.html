<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CivicPulse — Map View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #2C5AA0; --blue-dark: #1e3f72; --blue-light: #C1E4F9; --blue-soft: #EBF4FD;
      --teal: #00A8A8; --teal-soft: #E0F5F5;
      --bg: #F5F7FA; --white: #ffffff;
      --text: #222222; --text-mid: #4A5568; --text-light: #8896A5;
      --border: #E2E8F0; --sidebar-bg: #0f1e38;
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
    a { text-decoration: none; color: inherit; }

    .sidebar { width: 240px; background: var(--sidebar-bg); min-height: 100vh; display: flex; flex-direction: column; padding: 24px 0; position: fixed; top: 0; left: 0; z-index: 100; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 20px; }
    .logo-icon { width: 34px; height: 34px; background: var(--blue); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: 'Sora', sans-serif; font-weight: 800; font-size: 0.7rem; color: white; }
    .logo-name { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.05rem; color: white; }
    .logo-name span { color: var(--teal); }
    .dept-chip { margin: 0 16px 20px; background: rgba(44,90,160,0.2); border: 1px solid rgba(44,90,160,0.3); border-radius: 8px; padding: 8px 12px; }
    .dept-chip-label { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.3); margin-bottom: 3px; }
    .dept-chip-name { font-family: 'Sora', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--teal); }
    .nav-group { padding: 0 12px; margin-bottom: 6px; }
    .nav-group-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(255,255,255,0.2); padding: 0 8px; margin-bottom: 6px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 9px; color: rgba(255,255,255,0.45); font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s; margin-bottom: 2px; }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
    .nav-item.active { background: rgba(44,90,160,0.25); color: var(--blue-light); }
    .sidebar-bottom { margin-top: auto; padding: 16px 12px 0; border-top: 1px solid rgba(255,255,255,0.06); }
    .admin-row { display: flex; align-items: center; gap: 10px; padding: 10px; }
    .admin-av { width: 32px; height: 32px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-family: 'Sora', sans-serif; font-weight: 800; font-size: 0.82rem; color: white; flex-shrink: 0; }
    .admin-name { font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.7); }
    .admin-role { font-size: 0.68rem; color: rgba(255,255,255,0.3); }
    .logout-btn { width: 100%; margin-top: 8px; padding: 9px; background: transparent; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: rgba(255,255,255,0.4); font-size: 0.8rem; font-weight: 500; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.15s; }
    .logout-btn:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.7); }

    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .topbar { padding: 18px 28px; background: var(--white); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; flex-shrink: 0; }
    .page-title { font-family: 'Sora', sans-serif; font-size: 1.2rem; font-weight: 800; color: var(--text); }
    .page-sub { font-size: 0.8rem; color: var(--text-light); margin-top: 2px; }

    .filter-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; font-size: 0.78rem; font-weight: 600; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-mid); transition: all 0.15s; }
    .pill-btn:hover { border-color: var(--blue); color: var(--blue); }
    .pill-btn.active { border-color: var(--blue); background: var(--blue-soft); color: var(--blue); }
    .pill-btn.pc.active { border-color: #C0392B; background: #FFF0F0; color: #C0392B; }
    .pill-btn.ph.active { border-color: #C87C00; background: #FFF4E6; color: #C87C00; }
    .pill-btn.pm.active { border-color: #B7791F; background: #FFFBE6; color: #B7791F; }
    .pill-btn.pr.active { border-color: #1A7A50; background: #E8FBF5; color: #1A7A50; }

    .map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    .leaflet-popup-content-wrapper { border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border: 1px solid var(--border); padding: 0; overflow: hidden; }
    .leaflet-popup-content { margin: 0; }
    .popup-card { padding: 14px 16px; min-width: 210px; }
    .popup-id { font-family: monospace; font-size: 0.65rem; color: var(--text-light); margin-bottom: 4px; }
    .popup-type { font-family: 'Sora', sans-serif; font-size: 0.9rem; font-weight: 800; color: var(--text); margin-bottom: 5px; }
    .popup-desc { font-size: 0.75rem; color: var(--text-mid); line-height: 1.5; margin-bottom: 10px; }
    .popup-foot { display: flex; justify-content: space-between; align-items: center; }
    .popup-status { padding: 3px 9px; border-radius: 20px; font-size: 0.65rem; font-weight: 600; }
    .ps-sub { background: #F0F0F0; color: #555; }
    .ps-rev { background: var(--blue-soft); color: var(--blue); }
    .ps-prog { background: #FFF4E6; color: #C87C00; }
    .ps-res { background: #E8FBF5; color: #1A7A50; }
    .popup-priority { font-size: 0.7rem; font-weight: 700; }
    .pp-c { color: #C0392B; } .pp-h { color: #C87C00; } .pp-m { color: #B7791F; } .pp-l { color: var(--teal); }
    .popup-sdg { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
    .popup-sdg-tag { padding: 2px 7px; background: var(--teal-soft); border: 1px solid #B2E8E8; border-radius: 20px; font-size: 0.6rem; font-weight: 600; color: var(--teal); }

    .map-counter { position: absolute; top: 16px; right: 16px; background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; z-index: 999; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .counter-num { font-family: 'Sora', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--text); line-height: 1; }
    .counter-label { font-size: 0.7rem; color: var(--text-light); margin-top: 2px; }

    .legend { position: absolute; bottom: 24px; right: 16px; background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; z-index: 999; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .legend-title { font-family: 'Sora', sans-serif; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-light); margin-bottom: 10px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.75rem; color: var(--text-mid); }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

    @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">CP</div>
    <span class="logo-name">Civic<span>Pulse</span></span>
  </div>
  <div class="dept-chip">
    <div class="dept-chip-label">Department</div>
    <div class="dept-chip-name" id="sidebarDept">Loading...</div>
  </div>
  <div class="nav-group">
    <div class="nav-group-label">Main</div>
    <a href="dashboard.html" class="nav-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a href="complaints.html" class="nav-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>Complaints</a>
    <a href="map.html" class="nav-item active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>Map View</a>
    <a href="analytics.html" class="nav-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Analytics</a>
  </div>
  <div class="sidebar-bottom">
    <div class="admin-row">
      <div class="admin-av" id="sidebarInitial">A</div>
      <div><div class="admin-name" id="sidebarName">Admin</div><div class="admin-role" id="sidebarRole">Authority</div></div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div><div class="page-title">Map View</div><div class="page-sub">Geographic view of complaints in your jurisdiction</div></div>
    <div class="filter-pills">
      <button class="pill-btn active" onclick="setFilter('all',this)">All</button>
      <button class="pill-btn pc" onclick="setFilter('Critical',this)">Critical</button>
      <button class="pill-btn ph" onclick="setFilter('High',this)">High</button>
      <button class="pill-btn pm" onclick="setFilter('Medium',this)">Medium</button>
      <button class="pill-btn pr" onclick="setFilter('Resolved',this)">Resolved</button>
    </div>
  </div>
  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-counter"><div class="counter-num" id="markerCount">0</div><div class="counter-label">shown</div></div>
    <div class="legend">
      <div class="legend-title">Priority</div>
      <div class="legend-item"><div class="legend-dot" style="background:#C0392B"></div>Critical</div>
      <div class="legend-item"><div class="legend-dot" style="background:#C87C00"></div>High</div>
      <div class="legend-item"><div class="legend-dot" style="background:#B7791F"></div>Medium</div>
      <div class="legend-item"><div class="legend-dot" style="background:#00A8A8"></div>Low / Resolved</div>
    </div>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const API = 'http://localhost:5000/api';
  const token = localStorage.getItem('cp_token');
  const user = JSON.parse(localStorage.getItem('cp_user') || '{}');
  if (!token || user.role !== 'admin') window.location.href = 'login.html';

  document.getElementById('sidebarName').textContent = user.name || 'Admin';
  document.getElementById('sidebarInitial').textContent = (user.name || 'A').charAt(0).toUpperCase();
  document.getElementById('sidebarDept').textContent = user.department || 'Super Admin';
  document.getElementById('sidebarRole').textContent = user.department ? `${user.department} Dept.` : 'All Departments';

  const PRIORITY_COLORS = { Critical: '#C0392B', High: '#C87C00', Medium: '#B7791F', Low: '#00A8A8' };
  const STATUS_CLASS = { 'Submitted': 'ps-sub', 'Under Review': 'ps-rev', 'In Progress': 'ps-prog', 'Resolved': 'ps-res' };
  const PRIORITY_CLASS = { 'Critical': 'pp-c', 'High': 'pp-h', 'Medium': 'pp-m', 'Low': 'pp-l' };

  let map, allComplaints = [], markers = [], currentFilter = 'all';

  window.addEventListener('load', () => {
    map = L.map('map').setView([30.3165, 78.0322], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
    loadComplaints();
  });

  async function loadComplaints() {
    try {
      const res = await fetch(`${API}/admin/complaints`, { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      allComplaints = (data.complaints || []).filter(c => c.location?.lat && c.location?.lng);
      renderMarkers();
    } catch { console.error('Could not load'); }
  }

  function renderMarkers() {
    markers.forEach(m => map.removeLayer(m)); markers = [];
    const filtered = currentFilter === 'all' ? allComplaints : currentFilter === 'Resolved' ? allComplaints.filter(c => c.status === 'Resolved') : allComplaints.filter(c => c.priority === currentFilter);
    document.getElementById('markerCount').textContent = filtered.length;

    filtered.forEach(c => {
      const color = c.status === 'Resolved' ? '#00A8A8' : (PRIORITY_COLORS[c.priority] || '#8896A5');
      const icon = L.divIcon({ className: '', html: `<div style="width:13px;height:13px;background:${color};border:2.5px solid white;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.2);"></div>`, iconSize: [13,13], iconAnchor: [6,6] });
      const popup = `<div class="popup-card">
        <div class="popup-id">${c.trackingId}</div>
        <div class="popup-type">${c.category || 'Civic Issue'}</div>
        <div class="popup-desc">${(c.rawText || '').slice(0, 90)}${c.rawText?.length > 90 ? '...' : ''}</div>
        <div class="popup-foot">
          <span class="popup-status ${STATUS_CLASS[c.status] || 'ps-sub'}">${c.status}</span>
          <span class="popup-priority ${PRIORITY_CLASS[c.priority] || 'pp-m'}">${c.priority}</span>
        </div>
        ${c.sdgTags?.length ? `<div class="popup-sdg">${c.sdgTags.map(t => `<span class="popup-sdg-tag">${t}</span>`).join('')}</div>` : ''}
      </div>`;
      const m = L.marker([c.location.lat, c.location.lng], { icon }).addTo(map).bindPopup(popup, { maxWidth: 250 });
      markers.push(m);
    });
    if (markers.length > 0) map.fitBounds(L.featureGroup(markers).getBounds().pad(0.1));
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMarkers();
  }

  function logout() { localStorage.removeItem('cp_token'); localStorage.removeItem('cp_user'); sessionStorage.setItem('logged_out','1'); window.location.replace('login.html'); }
</script>
</body>
</html>
