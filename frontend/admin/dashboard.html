<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CivicPulse — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #2C5AA0; --blue-dark: #1e3f72; --blue-light: #C1E4F9; --blue-soft: #EBF4FD;
      --teal: #00A8A8; --teal-soft: #E0F5F5;
      --bg: #F5F7FA; --white: #ffffff;
      --text: #222222; --text-mid: #4A5568; --text-light: #8896A5;
      --border: #E2E8F0; --sidebar-bg: #0f1e38;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(44,90,160,0.06);
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
    a { text-decoration: none; color: inherit; }

    /* SIDEBAR */
    .sidebar {
      width: 240px; background: var(--sidebar-bg); min-height: 100vh;
      display: flex; flex-direction: column; padding: 24px 0;
      position: fixed; top: 0; left: 0; z-index: 100;
    }

    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 20px; }
    .logo-icon { width: 34px; height: 34px; background: var(--blue); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: 'Sora', sans-serif; font-weight: 800; font-size: 0.7rem; color: white; }
    .logo-name { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.05rem; color: white; }
    .logo-name span { color: var(--teal); }

    .dept-chip { margin: 0 16px 20px; background: rgba(44,90,160,0.2); border: 1px solid rgba(44,90,160,0.3); border-radius: 8px; padding: 8px 12px; }
    .dept-chip-label { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.3); margin-bottom: 3px; }
    .dept-chip-name { font-family: 'Sora', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--teal); }

    .nav-group { padding: 0 12px; margin-bottom: 6px; }
    .nav-group-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(255,255,255,0.2); padding: 0 8px; margin-bottom: 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 10px;
      border-radius: 9px; color: rgba(255,255,255,0.45); font-size: 0.875rem; font-weight: 500;
      cursor: pointer; transition: background 0.15s, color 0.15s; margin-bottom: 2px;
    }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
    .nav-item.active { background: rgba(44,90,160,0.25); color: var(--blue-light); }
    .nav-item svg { flex-shrink: 0; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }

    .sidebar-bottom { margin-top: auto; padding: 16px 12px 0; border-top: 1px solid rgba(255,255,255,0.06); }
    .admin-row { display: flex; align-items: center; gap: 10px; padding: 10px; }
    .admin-av { width: 32px; height: 32px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-family: 'Sora', sans-serif; font-weight: 800; font-size: 0.82rem; color: white; flex-shrink: 0; }
    .admin-name { font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.7); }
    .admin-role { font-size: 0.68rem; color: rgba(255,255,255,0.3); }
    .logout-btn { width: 100%; margin-top: 8px; padding: 9px; background: transparent; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: rgba(255,255,255,0.4); font-size: 0.8rem; font-weight: 500; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.15s; }
    .logout-btn:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.7); }

    /* MAIN */
    .main { margin-left: 240px; flex: 1; padding: 32px 36px 60px; }

    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
    .page-title { font-family: 'Sora', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--text); letter-spacing: -0.3px; }
    .page-sub { font-size: 0.83rem; color: var(--text-light); margin-top: 3px; }
    .date-tag { font-size: 0.8rem; color: var(--text-light); background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 7px 14px; }

    /* STAT CARDS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: var(--shadow); }
    .stat-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .stat-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .si-blue { background: var(--blue-soft); }
    .si-orange { background: #FFF4E6; }
    .si-teal { background: var(--teal-soft); }
    .si-green { background: #E8FBF5; }
    .stat-num { font-family: 'Sora', sans-serif; font-size: 1.9rem; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 0.75rem; color: var(--text-light); font-weight: 500; }

    /* GRID */
    .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

    .card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 22px; box-shadow: var(--shadow); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .card-title { font-family: 'Sora', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .card-action { font-size: 0.78rem; color: var(--blue); font-weight: 600; cursor: pointer; }
    .card-action:hover { text-decoration: underline; }

    /* PRIORITY BARS */
    .priority-list { display: flex; flex-direction: column; gap: 14px; }
    .priority-row { display: flex; flex-direction: column; gap: 6px; }
    .priority-top { display: flex; justify-content: space-between; }
    .priority-name { font-size: 0.82rem; font-weight: 600; color: var(--text-mid); }
    .priority-count { font-family: 'Sora', sans-serif; font-size: 0.82rem; font-weight: 700; color: var(--text); }
    .bar-track { height: 6px; background: var(--bg); border-radius: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 10px; transition: width 0.8s ease; }
    .bc { background: #C0392B; }
    .bh { background: #C87C00; }
    .bm { background: #B7791F; }
    .bl { background: var(--teal); }

    /* DONUT */
    .donut-wrap { display: flex; align-items: center; gap: 24px; }
    .legend { display: flex; flex-direction: column; gap: 10px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-mid); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-val { font-weight: 700; color: var(--text); margin-left: auto; font-family: 'Sora', sans-serif; }

    /* RECENT */
    .full-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 22px; box-shadow: var(--shadow); }
    .complaint-row { display: flex; align-items: center; gap: 12px; padding: 11px 8px; border-bottom: 1px solid var(--border); cursor: pointer; border-radius: 8px; transition: background 0.15s; }
    .complaint-row:last-child { border-bottom: none; }
    .complaint-row:hover { background: var(--bg); }
    .cr-icon { width: 34px; height: 34px; border-radius: 8px; background: var(--blue-soft); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; }
    .cr-body { flex: 1; min-width: 0; }
    .cr-type { font-family: 'Sora', sans-serif; font-size: 0.82rem; font-weight: 700; color: var(--text); margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cr-meta { font-size: 0.72rem; color: var(--text-light); }
    .cr-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .status-pill { padding: 3px 9px; border-radius: 20px; font-size: 0.68rem; font-weight: 600; }
    .s-submitted { background: #F0F0F0; color: #555; }
    .s-under-review { background: var(--blue-soft); color: var(--blue); }
    .s-in-progress { background: #FFF4E6; color: #C87C00; }
    .s-resolved { background: #E8FBF5; color: #1A7A50; }
    .s-rejected { background: #FFF0F0; color: #C0392B; }
    .sdg-tag { padding: 2px 7px; background: var(--teal-soft); border: 1px solid #B2E8E8; border-radius: 20px; font-size: 0.62rem; font-weight: 600; color: var(--teal); margin-right: 3px; }
    .cr-id { font-family: monospace; font-size: 0.65rem; color: var(--text-light); }

    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { text-align: center; padding: 28px; color: var(--text-light); font-size: 0.875rem; }

    @media (max-width: 1100px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .content-grid { grid-template-columns: 1fr; } }
    @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; padding: 20px; } }
  </style>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">CP</div>
    <span class="logo-name">Civic<span>Pulse</span></span>
  </div>

  <div class="dept-chip">
    <div class="dept-chip-label">Department</div>
    <div class="dept-chip-name" id="sidebarDept">Loading...</div>
  </div>

  <div class="nav-group">
    <div class="nav-group-label">Main</div>
    <a href="dashboard.html" class="nav-item active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="complaints.html" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
      Complaints
    </a>
    <a href="map.html" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Map View
    </a>
    <a href="analytics.html" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Analytics
    </a>
  </div>

  <div class="sidebar-bottom">
    <div class="admin-row">
      <div class="admin-av" id="sidebarInitial">A</div>
      <div>
        <div class="admin-name" id="sidebarName">Admin</div>
        <div class="admin-role" id="sidebarRole">Authority</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div>
      <div class="page-title">Dashboard</div>
      <div class="page-sub" id="deptSubtitle">Overview of your department's complaints</div>
    </div>
    <span class="date-tag" id="dateBadge"></span>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-top">
        <div class="stat-icon si-blue">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2C5AA0" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>
        </div>
      </div>
      <div class="stat-num" id="statTotal">—</div>
      <div class="stat-label">Total Complaints</div>
    </div>
    <div class="stat-card">
      <div class="stat-top">
        <div class="stat-icon si-orange">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C87C00" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
        </div>
      </div>
      <div class="stat-num" id="statPending">—</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-card">
      <div class="stat-top">
        <div class="stat-icon si-teal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00A8A8" stroke-width="2"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        </div>
      </div>
      <div class="stat-num" id="statProgress">—</div>
      <div class="stat-label">In Progress</div>
    </div>
    <div class="stat-card">
      <div class="stat-top">
        <div class="stat-icon si-green">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A7A50" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg>
        </div>
      </div>
      <div class="stat-num" id="statResolved">—</div>
      <div class="stat-label">Resolved</div>
    </div>
  </div>

  <div class="content-grid">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Priority Breakdown</span>
        <a href="complaints.html" class="card-action">View all →</a>
      </div>
      <div class="priority-list" id="priorityList"><div class="spinner"></div></div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Status Overview</span></div>
      <div class="donut-wrap" id="donutWrap"><div class="spinner"></div></div>
    </div>
  </div>

  <div class="full-card">
    <div class="card-header">
      <span class="card-title">Recent Complaints</span>
      <a href="complaints.html" class="card-action">Manage all →</a>
    </div>
    <div id="recentList"><div class="spinner"></div></div>
  </div>
</main>

<script>
  const API = 'http://localhost:5000/api';
  const token = localStorage.getItem('cp_token');
  const user = JSON.parse(localStorage.getItem('cp_user') || '{}');
  if (!token || user.role !== 'admin') window.location.href = 'login.html';

  const CAT_ICONS = { roads: '🛣️', water: '💧', garbage: '🗑️', drainage: '🌊', electricity: '⚡', other: '📋', 'Roads & Infrastructure': '🛣️', 'Water Supply': '💧', 'Garbage & Waste': '🗑️', 'Drainage & Sewage': '🌊', 'Electricity & Streetlights': '⚡', 'Public Nuisance': '📋' };
  const STATUS_CLASS = { 'Submitted': 's-submitted', 'Under Review': 's-under-review', 'In Progress': 's-in-progress', 'Resolved': 's-resolved', 'Rejected': 's-rejected' };

  document.getElementById('sidebarName').textContent = user.name || 'Admin';
  document.getElementById('sidebarInitial').textContent = (user.name || 'A').charAt(0).toUpperCase();
  document.getElementById('sidebarDept').textContent = user.department || 'Super Admin';
  document.getElementById('sidebarRole').textContent = user.department ? `${user.department} Dept.` : 'All Departments';
  document.getElementById('deptSubtitle').textContent = user.department ? `Overview of ${user.department} department` : 'Overview of all complaints';
  document.getElementById('dateBadge').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });

  async function loadDashboard() {
    try {
      const res = await fetch(`${API}/admin/dashboard`, { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      if (!res.ok) throw new Error();
      const { stats, priorityBreakdown, recentComplaints } = data;

      document.getElementById('statTotal').textContent = stats.total || 0;
      document.getElementById('statPending').textContent = (stats.submitted || 0) + (stats.underReview || 0);
      document.getElementById('statProgress').textContent = stats.inProgress || 0;
      document.getElementById('statResolved').textContent = stats.resolved || 0;

      renderPriority(priorityBreakdown || {}, stats.total || 1);
      renderDonut(stats);
      renderRecent(recentComplaints || []);
    } catch {
      document.getElementById('recentList').innerHTML = '<div class="empty">Could not load data. Make sure backend is running.</div>';
      document.getElementById('priorityList').innerHTML = '<div class="empty">No data</div>';
      document.getElementById('donutWrap').innerHTML = '<div class="empty">No data</div>';
    }
  }

  function renderPriority(data, total) {
    const items = [
      { label: 'Critical', key: 'Critical', cls: 'bc' },
      { label: 'High', key: 'High', cls: 'bh' },
      { label: 'Medium', key: 'Medium', cls: 'bm' },
      { label: 'Low', key: 'Low', cls: 'bl' },
    ];
    document.getElementById('priorityList').innerHTML = items.map(item => {
      const count = data[item.key] || 0;
      const pct = total ? Math.round((count / total) * 100) : 0;
      return `<div class="priority-row">
        <div class="priority-top"><span class="priority-name">${item.label}</span><span class="priority-count">${count}</span></div>
        <div class="bar-track"><div class="bar-fill ${item.cls}" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
  }

  function renderDonut(stats) {
    const data = [
      { label: 'Resolved', val: stats.resolved || 0, color: '#1A7A50' },
      { label: 'In Progress', val: stats.inProgress || 0, color: '#C87C00' },
      { label: 'Submitted', val: stats.submitted || 0, color: '#8896A5' },
      { label: 'Under Review', val: stats.underReview || 0, color: '#2C5AA0' },
    ];
    const total = data.reduce((s, d) => s + d.val, 0) || 1;
    let offset = 0;
    const r = 48, cx = 58, cy = 58, stroke = 16, circ = 2 * Math.PI * r;

    const segments = data.map(d => {
      const pct = d.val / total;
      const seg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${stroke}"
        stroke-dasharray="${pct * circ} ${circ}" stroke-dashoffset="${-offset * circ}"
        transform="rotate(-90 ${cx} ${cy})"/>`;
      offset += pct;
      return seg;
    }).join('');

    document.getElementById('donutWrap').innerHTML = `
      <svg width="116" height="116" viewBox="0 0 116 116" style="flex-shrink:0">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#E2E8F0" stroke-width="${stroke}"/>
        ${segments}
        <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-family="Sora" font-weight="800" font-size="15" fill="#222">${total}</text>
        <text x="${cx}" y="${cy+13}" text-anchor="middle" font-family="Plus Jakarta Sans" font-size="8" fill="#8896A5">total</text>
      </svg>
      <div class="legend">
        ${data.map(d => `<div class="legend-item">
          <div class="legend-dot" style="background:${d.color}"></div>
          <span>${d.label}</span>
          <span class="legend-val">${d.val}</span>
        </div>`).join('')}
      </div>`;
  }

  function renderRecent(complaints) {
    if (!complaints.length) { document.getElementById('recentList').innerHTML = '<div class="empty">No complaints yet.</div>'; return; }
    document.getElementById('recentList').innerHTML = complaints.slice(0, 8).map(c => `
      <div class="complaint-row" onclick="window.location.href='complaints.html?id=${c._id}'">
        <div class="cr-icon">${CAT_ICONS[c.category] || '📋'}</div>
        <div class="cr-body">
          <div class="cr-type">${c.category || 'Civic Issue'}</div>
          <div class="cr-meta">${c.location?.address ? c.location.address.split(',')[0] : '—'} · ${new Date(c.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })}</div>
        </div>
        <div class="cr-right">
          <span class="status-pill ${STATUS_CLASS[c.status] || 's-submitted'}">${c.status}</span>
          <div style="display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;">${(c.sdgTags || []).map(t => `<span class="sdg-tag">${t}</span>`).join('')}</div>
          <span class="cr-id">${c.trackingId}</span>
        </div>
      </div>`).join('');
  }

  function logout() { localStorage.removeItem('cp_token'); localStorage.removeItem('cp_user'); window.location.href = 'login.html'; }

  loadDashboard();
</script>
</body>
</html>
