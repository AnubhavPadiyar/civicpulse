<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CivicPulse — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #2C5AA0; --blue-dark: #1e3f72; --blue-light: #C1E4F9; --blue-soft: #EBF4FD;
      --teal: #00A8A8; --bg: #F5F7FA; --white: #ffffff;
      --text: #222222; --text-mid: #4A5568; --text-light: #8896A5;
      --border: #E2E8F0; --error: #C0392B; --error-soft: #FFF0F0;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #1a2744; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }

    .login-card {
      width: 100%; max-width: 420px;
      background: var(--white); border-radius: 20px; padding: 40px 36px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.3);
    }

    .logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 10px; }
    .logo-icon { width: 38px; height: 38px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Sora', sans-serif; font-weight: 800; font-size: 0.75rem; color: white; }
    .logo-name { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--text); }
    .logo-name span { color: var(--blue); }

    .admin-tag {
      text-align: center; margin-bottom: 28px;
      background: var(--blue-soft); color: var(--blue);
      border-radius: 20px; padding: 5px 16px;
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      display: inline-block; width: fit-content;
      margin-left: auto; margin-right: auto; display: block;
    }

    .form-title { font-family: 'Sora', sans-serif; font-size: 1.25rem; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .form-sub { font-size: 0.85rem; color: var(--text-light); margin-bottom: 24px; }

    .alert { padding: 11px 14px; border-radius: 9px; font-size: 0.83rem; font-weight: 500; display: none; margin-bottom: 16px; }
    .alert.show { display: block; }
    .alert.error { background: var(--error-soft); color: var(--error); border: 1px solid #FCCACA; }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-size: 0.8rem; font-weight: 600; color: var(--text-mid); }
    .field input {
      padding: 11px 14px; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 9px; font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9rem; color: var(--text); outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .field input:focus { border-color: var(--blue); background: var(--white); }
    .field input::placeholder { color: var(--text-light); }

    .submit-btn {
      width: 100%; padding: 13px; background: var(--blue); color: white;
      border: none; border-radius: 9px; font-family: 'Sora', sans-serif;
      font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 6px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.15s; box-shadow: 0 2px 10px rgba(44,90,160,0.3);
    }
    .submit-btn:hover { background: var(--blue-dark); }
    .submit-btn:disabled { background: var(--border); color: var(--text-light); cursor: not-allowed; box-shadow: none; }

    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link { display: block; text-align: center; margin-top: 20px; font-size: 0.82rem; color: rgba(255,255,255,0.35); transition: color 0.2s; }
    .back-link:hover { color: rgba(255,255,255,0.65); }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    .dept-hint { background: var(--blue-soft); border-radius: 10px; padding: 12px 14px; }
    .dept-hint-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--blue); margin-bottom: 8px; }
    .dept-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .dept-chip { padding: 3px 10px; background: var(--white); border: 1px solid var(--blue-light); border-radius: 20px; font-size: 0.7rem; font-weight: 600; color: var(--text-mid); }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">CP</div>
      <span class="logo-name">Civic<span>Pulse</span></span>
    </div>

    <div class="admin-tag">Admin Portal</div>

    <div class="form-title">Authority Login</div>
    <div class="form-sub">Access the admin dashboard to manage complaints</div>

    <div id="loginAlert" class="alert error"></div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="admin@civicpulse.in"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter admin password"/>
    </div>

    <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
      <span id="btnText">Login to Dashboard</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="divider"></div>

    <div class="dept-hint">
      <div class="dept-hint-label">Department Accounts</div>
      <div class="dept-list">
        <span class="dept-chip">Super Admin</span>
        <span class="dept-chip">Sanitation</span>
        <span class="dept-chip">Roads</span>
        <span class="dept-chip">Water</span>
        <span class="dept-chip">Electricity</span>
        <span class="dept-chip">Municipal</span>
      </div>
    </div>
  </div>

  <a href="../user/index.html" class="back-link">← Back to CivicPulse</a>

<script>
  const API = 'http://localhost:5000/api';
  const token = localStorage.getItem('cp_token');
  const user = JSON.parse(localStorage.getItem('cp_user') || '{}');
  if (token && user.role === 'admin') window.location.href = 'dashboard.html';

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return showAlert('Please fill in all fields.');
    setLoading(true);
    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Login failed');
      if (data.user.role !== 'admin') throw new Error('Access denied. Admin only.');
      localStorage.setItem('cp_token', data.token);
      localStorage.setItem('cp_user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } catch (err) { showAlert(err.message); }
    finally { setLoading(false); }
  }

  function showAlert(msg) {
    const el = document.getElementById('loginAlert');
    el.textContent = msg; el.classList.add('show');
  }

  function setLoading(on) {
    document.getElementById('loginBtn').disabled = on;
    document.getElementById('btnText').style.display = on ? 'none' : 'inline';
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
